<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Catholicism</title>
    <style>
        body { font-family: 'Georgia', serif; background-color: #a31a1a; margin: 0; padding: 0; }
        .header { text-align: center; padding: 20px; background-color: #630e10; border-bottom: 5px solid #d4af37; }
        .admin-container { max-width: 900px; margin: 20px auto; background-color: #fff; padding: 20px; border-radius: 5px; }
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; color: #333; }
        th { background-color: #630e10; color: #d4af37; padding: 12px; text-align: left; }
        td { padding: 12px; border: 1px solid #ddd; }
        .btn { padding: 6px 10px; border: none; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-accept { background-color: #27ae60; color: white; }
        .btn-reject { background-color: #c0392b; color: white; }
    </style>
</head>
<script src="sound.js" defer></script>
<body>

<div class="header">
   <img src="velasquez-coronacion-Copy.jpg" alt="Home Image" style="width: 100%; max-width: 250px; height: auto;">
  <h1 style="color: #d4af37; margin: 10px 0;">ADMIN DASHBOARD</h1>
  <a href="home.html" style="color: #fff; text-decoration: none;">← Home</a>
</div>

<div class="admin-container">
    <div class="table-container">
        <table>
            <thead><tr><th>Name</th><th>Email</th><th>Interest</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5">Loading data...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfesCxoSFtitYJ-gCEF0ANu3prWcJT3uPaOxJhImNEom35-5hf3lIU9wg0AgLEIsXyWg/exec";
    
    // நோட்டிபிகேஷன் அனுமதி கேட்பது
    window.onload = () => {
        if (Notification.permission !== 'granted') Notification.requestPermission();
        loadData();
    };

    function loadData() {
        fetch(SCRIPT_URL).then(res=>res.json()).then(data => {
            const tbody = document.getElementById('tableBody'); 
            tbody.innerHTML = "";
            data.forEach((row, i) => {
                if(i==0) return;
                tbody.innerHTML += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td>
                <td id="c${i}">${row[3]=='Pending'?`<button class="btn btn-accept" onclick="up('${row[1]}','Accepted',${i})">Accept</button> <button class="btn btn-reject" onclick="up('${row[1]}','Rejected',${i})">Reject</button>`:row[3]}</td></tr>`;
            });
        });
    }

    function up(email, status, i) {
        fetch(SCRIPT_URL, {method:'POST', body:new URLSearchParams({action:'update', email:email, status:status})});
        document.getElementById('c'+i).innerText = status;
        if (Notification.permission === 'granted') {
            new Notification("Update Status", { body: "Request for " + email + " has been " + status });
        }
    }

    // புதிய விண்ணப்பங்களை 30 வினாடிக்கு ஒருமுறை செக் செய்யும்
    setInterval(loadData, 30000); 
</script>
</body>
</html>
